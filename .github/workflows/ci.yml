name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install sentinel
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio ruff mypy

      - name: Pull scanner Docker images
        run: |
          docker pull bridgecrew/checkov:latest
          docker pull aquasec/trivy:latest
          docker pull zegl/kube-score:latest
          docker pull hadolint/hadolint:latest

      - name: Lint
        run: ruff check src/

      - name: Type check
        run: mypy --strict src/

      - name: Test
        run: pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://sentinel:sentinel@localhost:5432/sentinel

      - name: Scan terragoat
        run: sentinel scan evals/fixtures/terragoat --output results-terragoat.sarif
        continue-on-error: true

      - name: Scan k8s-goat
        run: sentinel scan evals/fixtures/k8s-goat --output results-k8s.sarif
        continue-on-error: true

      - name: Scan docker-goat
        run: sentinel scan evals/fixtures/docker-goat --output results-docker.sarif
        continue-on-error: true

      - name: Eval report
        run: sentinel eval-report --output evals/report.md
        continue-on-error: true

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results
          path: |
            results-*.sarif
            evals/report.md

      - name: Enrich + fix (if API key available)
        if: env.OPENAI_API_KEY != ''
        run: |
          sentinel scan evals/fixtures/terragoat --enrich --output enriched-terragoat.sarif
          sentinel fix evals/fixtures/terragoat --output fix-results.sarif
        env:
          LLM_PROVIDER: openai
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: meta/llama-3.3-70b-instruct
        continue-on-error: true

      - name: Upload enriched results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enriched-results
          path: enriched-*.sarif
