apiVersion: v1
kind: Pod
metadata:
  name: insecure-pod
  labels:
    app: insecure
spec:
  containers:
    - name: app
      image: nginx:latest
      ports:
        - containerPort: 80
      securityContext:
        privileged: true
        runAsUser: 0
        readOnlyRootFilesystem: false
      env:
        - name: DB_PASSWORD
          value: "supersecret"
  hostNetwork: true
  hostPID: true
  automountServiceAccountToken: true
---
apiVersion: v1
kind: Service
metadata:
  name: exposed-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: insecure
  template:
    metadata:
      labels:
        app: insecure
    spec:
      containers:
        - name: app
          image: nginx:latest
          securityContext:
            privileged: true
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
      automountServiceAccountToken: true
