apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel-iac.fullname" . }}-config
  labels:
    app.kubernetes.io/name: {{ include "sentinel-iac.name" . }}
    helm.sh/chart: {{ include "sentinel-iac.chart" . }}
type: Opaque
stringData:
  API_KEY: {{ .Values.config.apiKey | quote }}
  OPENAI_API_KEY: {{ .Values.config.openaiApiKey | quote }}
  OPENAI_BASE_URL: {{ .Values.config.openaiBaseUrl | quote }}
  OPENAI_MODEL: {{ .Values.config.openaiModel | quote }}
  DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  EMBEDDING_MODEL: {{ .Values.config.embeddingModel | quote }}
