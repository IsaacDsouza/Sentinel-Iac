{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel-iac.fullname" . }}-api
  labels:
    app.kubernetes.io/name: {{ include "sentinel-iac.name" . }}-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sentinel-iac.name" . }}-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sentinel-iac.name" . }}-api
    spec:
      serviceAccountName: {{ include "sentinel-iac.fullname" . }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "sentinel.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - secretRef:
                name: {{ include "sentinel-iac.fullname" . }}-config
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
